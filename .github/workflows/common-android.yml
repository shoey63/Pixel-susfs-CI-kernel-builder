name: Android GKI - KSU/Susfs
run-name: "Build KSU/Susfs: ${{ inputs.build_name }} [${{ github.ref_name }}]"

on:
  workflow_dispatch:
    inputs:
      build_name:
        description: "Device & Build ID (e.g., komodo-cp1a)"
        required: true
        default: "komodo-cp1a"
        type: string
      
      ota_url:
        description: "Full OTA ZIP URL (with payload.bin in zip root)"
        required: false
        default: ""
        type: string

      manifest_branch:
        description: "Kernel manifest branch"
        required: true
        default: "common-android14-6.1-lts"
        type: string

env:
  MANIFEST_URL: https://android.googlesource.com/kernel/manifest
  MANIFEST_BRANCH: ${{ inputs.manifest_branch }}
  OTA_URL: ${{ inputs.ota_url }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        
      - name: Evaluate OTA URL for payload.bin compatibility 
        run: |
          sudo apt-get install -qq -y python3-venv > /dev/null
          python3 -m venv .venv
          source .venv/bin/activate
          pip install -q requests remotezip
          echo "========================================"
          echo "        OTA VALIDATION RESULT           "
          echo "========================================"
          python3 scripts/validate_ota.py
          echo "========================================"

      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: false
          large-packages: false
          docker-images: false
          swap-storage: false

      - name: Setup repo tool
        run: |
          mkdir -p "$HOME/bin"
          curl -fsSL https://storage.googleapis.com/git-repo-downloads/repo -o "$HOME/bin/repo"
          chmod +x "$HOME/bin/repo"
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: Sync kernel source
        run: |
          set -euo pipefail
          rm -rf kernel_workspace
          mkdir -p kernel_workspace
          cd kernel_workspace
          repo init -u "$MANIFEST_URL" -b "$MANIFEST_BRANCH" --depth=1
          repo sync -c --no-tags --no-clone-bundle --current-branch --fail-fast -j4

      - name: Integrate KernelSU-Next
        env:
          KSU_NEXT_SETUP_URL: https://raw.githubusercontent.com/pershoot/KernelSU-Next/dev/kernel/setup.sh # <-- Updated
          KSU_NEXT_REPO_URL: https://github.com/pershoot/KernelSU-Next.git # <-- Updated
          KSU_NEXT_REF: dev-susfs
          KSU_NEXT_HOOK_MODE: ""
        run: |
          bash ./scripts/integrate_ksu_next.sh

      - name: Integrate SUSFS common-side
        env:
          SUSFS_NEXT_URL: https://gitlab.com/simonpunk/susfs4ksu.git # <-- Updated
          SUSFS_NEXT_REF: gki-android15-6.6 # <-- Updated
        run: |
          bash ./scripts/integrate_susfs_next.sh
          
      - name: Build common kernel Image
        run: |
          bash ./scripts/build_kernel.sh

      - name: Pull stock boot.img from OTA
        if: env.REPACK_ENABLED == 'true'
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          pip install git+https://github.com/shoey63/payload-dumper
          mkdir -p work/stock
          python3 ./scripts/ota_pull.py \
            --source "$OTA_URL" \
            --partition boot \
            --outdir work/stock
          echo ">>> Pulled stock boot image(s)"
          find work/stock -maxdepth 1 -type f \( -name 'boot.img' -o -name 'boot-*.img' \) -ls

      - name: Repack boot image with built Image
        if: env.REPACK_ENABLED == 'true'
        run: |
          mkdir -p out/final
          mkdir -p work/repack-tmp
          chmod +x ./tools/magiskboot || true

          BOOT_IMG="$(find work/stock -maxdepth 1 -type f \( -name 'boot.img' -o -name 'boot-*.img' \) | head -n 1)"
          [ -n "$BOOT_IMG" ] || { echo "[-] Could not find stock boot image"; exit 1; }

          STOCK_NAME="$(basename "$BOOT_IMG" .img)"
          cp -f "$BOOT_IMG" "out/final/${STOCK_NAME}-stock.img"
          bash ./scripts/boot_swap.sh \
            --boot "$BOOT_IMG" \
            --image "out/Image" \
            --magiskboot "./tools/magiskboot" \
            --outdir "out/final" \
            --outname "${STOCK_NAME}-repacked.img" \
            --workdir "work/repack-tmp"

      - name: Prepare Final Artifacts
        run: |
          mkdir -p out/final
          echo -e "MANIFEST_URL=${MANIFEST_URL}\nMANIFEST_BRANCH=${MANIFEST_BRANCH}\nOTA_URL=${OTA_URL}\nTIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S UTC')" > out/final/repack_metadata.txt
          if [ "$REPACK_ENABLED" != "true" ]; then
            echo ">>> Image-only mode: Copying raw kernel Image to artifacts"
            cp -f out/Image out/final/ || true
          fi
          
          echo ">>> Final Artifact Directory:"
          ls -lah out/final/

      - name: Upload repacked boot artifact
        uses: actions/upload-artifact@v4
        with:
          name: common-android15-6.6-repacked-boot
          path: out/final/
          if-no-files-found: error
