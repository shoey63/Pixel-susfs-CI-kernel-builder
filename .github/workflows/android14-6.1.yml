name: Android 14 6.1 - Common Kernel + Repacked Boot
run-name: "Build: ${{ inputs.build_name }} [${{ github.ref_name }}]"

on:
  workflow_dispatch:
    inputs:
      build_name:
        description: "Device & Build ID (e.g., komodo-cp1a)"
        required: true
        default: "Pixel GKI android14-6.1"
        type: string
      ota_url:
        description: "Full OTA ZIP URL"
        required: true
        default: "*enter url or run will fail*"
        type: string
      manifest_branch:
        description: "Kernel manifest branch"
        required: true
        default: "common-android14-6.1-2026-03"
        type: string

env:
  MANIFEST_URL: https://android.googlesource.com/kernel/manifest
  MANIFEST_BRANCH: ${{ inputs.manifest_branch }}
  OTA_URL: ${{ inputs.ota_url }}

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: false
          large-packages: false
          docker-images: false
          swap-storage: false

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git curl unzip zip bc bison flex libssl-dev python3 python3-venv file xz-utils cpio
          chmod +x ./tools/magiskboot

      - name: Setup repo tool
        run: |
          mkdir -p "$HOME/bin"
          curl -fsSL https://storage.googleapis.com/git-repo-downloads/repo -o "$HOME/bin/repo"
          chmod +x "$HOME/bin/repo"
          echo "$HOME/bin" >> "$GITHUB_PATH"

      - name: Sync kernel source
        run: |
          set -euo pipefail
          rm -rf kernel_workspace
          mkdir -p kernel_workspace
          cd kernel_workspace
          repo init -u "$MANIFEST_URL" -b "$MANIFEST_BRANCH" --depth=1
          repo sync -c --no-tags --no-clone-bundle --current-branch --fail-fast -j4

      - name: Integrate KernelSU-Next
        env:
          KSU_NEXT_SETUP_URL: https://raw.githubusercontent.com/pershoot/KernelSU-Next/dev-susfs/kernel/setup.sh
          KSU_NEXT_REPO_URL: https://github.com/pershoot/KernelSU-Next.git
          KSU_NEXT_REF: dev-susfs
          KSU_NEXT_HOOK_MODE: ""
        run: |
          bash ./scripts/android14-6.1-integrate_ksu_next.sh

      - name: Integrate SUSFS common-side
        env:
          SUSFS_NEXT_URL: https://gitlab.com/pershoot/susfs4ksu.git
          SUSFS_NEXT_REF: gki-android14-6.1-lts-dev
          SUSFS_NEXT_COMMIT: ""
        run: |
          bash ./scripts/android14-6.1-integrate_susfs_next.sh

      - name: Build common kernel Image
        run: |
          bash ./scripts/android14-6.1-build_kernel.sh

      - name: Pull stock boot.img from OTA
        run: |
          python3 -m venv .venv
          source .venv/bin/activate
          pip install requests remotezip git+https://github.com/shoey63/payload-dumper
          mkdir -p work/stock
          python3 ./scripts/ota_pull.py \
            --source "$OTA_URL" \
            --partition boot \
            --outdir work/stock
          echo ">>> Pulled stock boot image(s)"
          find work/stock -maxdepth 1 -type f \( -name 'boot.img' -o -name 'boot-*.img' \) -ls

      - name: Repack boot image with built Image
        run: |
          mkdir -p out/final
          mkdir -p work/repack-tmp

          BOOT_IMG="$(find work/stock -maxdepth 1 -type f \( -name 'boot.img' -o -name 'boot-*.img' \) | head -n 1)"
          [ -n "$BOOT_IMG" ] || { echo "[-] Could not find stock boot image"; exit 1; }

          STOCK_NAME="$(basename "$BOOT_IMG" .img)"
          cp -f "$BOOT_IMG" "out/final/${STOCK_NAME}-stock.img"

          bash ./scripts/boot_swap.sh \
            --boot "$BOOT_IMG" \
            --image "out/Image" \
            --magiskboot "./tools/magiskboot" \
            --outdir "out/final" \
            --outname "${STOCK_NAME}-repacked.img" \
            --workdir "work/repack-tmp"

      - name: Prepare Final Artifacts
        run: |
          echo -e "MANIFEST_URL=${MANIFEST_URL}\nMANIFEST_BRANCH=${MANIFEST_BRANCH}\nOTA_URL=${OTA_URL}\nTIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S UTC')" > out/final/repack_metadata.txt
          cp -f out/build_common_kernel.log out/final/ || true
          cp -f out/image_strings.txt out/final/strings.txt || true
          echo ">>> Final Artifact Directory:"
          ls -lah out/final/

      - name: Upload repacked boot artifact
        uses: actions/upload-artifact@v4
        with:
          name: common-android14-6.1-repacked-boot
          path: out/final/
          if-no-files-found: error
